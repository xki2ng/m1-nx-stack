lifecycle_manager:
  ros__parameters:
    node_names:
    - controller_server
    - planner_server
    - behavior_server
    - bt_navigator
    autostart: true
    bond_timeout: 10.0

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: body
    odom_topic: /Odometry
    default_nav_to_pose_bt_xml: /home/robot/fastlio/config/m1_bt_nav.xml
    default_nav_through_poses_bt_xml: /home/robot/fastlio/config/m1_bt_nav.xml
    plugin_lib_names:
    - nav2_compute_path_to_pose_action_bt_node
    - nav2_compute_path_through_poses_action_bt_node
    - nav2_follow_path_action_bt_node
    - nav2_back_up_action_bt_node
    - nav2_spin_action_bt_node
    - nav2_wait_action_bt_node
    - nav2_clear_costmap_service_bt_node
    - nav2_is_stuck_condition_bt_node
    - nav2_goal_reached_condition_bt_node
    - nav2_initial_pose_received_condition_bt_node
    - nav2_goal_updated_condition_bt_node
    - nav2_reinitialize_global_localization_service_bt_node
    - nav2_rate_controller_bt_node
    - nav2_distance_controller_bt_node
    - nav2_speed_controller_bt_node
    - nav2_truncate_path_action_bt_node
    - nav2_goal_updater_node_bt_node
    - nav2_recovery_node_bt_node
    - nav2_pipeline_sequence_bt_node
    - nav2_round_robin_node_bt_node
    - nav2_transform_available_condition_bt_node
    - nav2_time_expired_condition_bt_node
    - nav2_distance_traveled_condition_bt_node
    - nav2_single_trigger_bt_node
    - nav2_is_battery_low_condition_bt_node
    - nav2_navigate_through_poses_action_bt_node
    - nav2_navigate_to_pose_action_bt_node
    - nav2_remove_passed_goals_action_bt_node
    - nav2_planner_selector_bt_node
    - nav2_controller_selector_bt_node
    - nav2_goal_checker_selector_bt_node

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    robot_base_frame: body
    odom_topic: /Odometry
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: progress_checker
    goal_checker_plugin: goal_checker
    controller_plugins:
    - FollowPath
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 6.28
      stateful: true
    FollowPath:
      plugin: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController
      desired_linear_vel: 0.5
      max_linear_vel: 0.5
      min_linear_vel: 0.0
      lookahead_dist: 0.6
      min_lookahead_dist: 0.4
      max_lookahead_dist: 1.0
      use_velocity_scaled_lookahead_dist: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_regulated_linear_velocity_scaling: true
      robot_base_frame: body
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      rotate_to_heading_angular_vel: 1.0
      max_angular_vel: 1.0
      min_approach_linear_vel: 0.1
      use_approach_linear_velocity_scaling: true
      approach_velocity_scaling_dist: 2.0
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      transform_tolerance: 5.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: body
      rolling_window: true
      width: 20
      height: 20
      resolution: 0.1
      transform_tolerance: 5.0
      qos_overrides:
        /global_costmap/costmap:
          publisher:
            durability: VOLATILE
      plugins:
      - voxel_layer
      - inflation_layer
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.4
        cost_scaling_factor: 5.0
      voxel_layer:
        plugin: nav2_costmap_2d::VoxelLayer
        enabled: true
        footprint_clearing_enabled: true
        combination_method: 1
        observation_sources: front_scan rear_scan
        front_scan:
          topic: /front_lidar/filtered
          sensor_frame: rslidar_head
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_range: 3.0
          raytrace_range: 4.0
          clearing: true
          marking: true
          data_type: PointCloud2
        rear_scan:
          topic: /rear_lidar/filtered
          sensor_frame: rslidar_tail
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_range: 3.0
          raytrace_range: 4.0
          clearing: true
          marking: true
          data_type: PointCloud2
      footprint: '[[0.5, 0.3], [0.5, -0.3], [-0.5, -0.3], [-0.5, 0.3]]'

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: body
      rolling_window: true
      width: 20
      height: 20
      resolution: 0.1
      transform_tolerance: 5.0
      qos_overrides:
        /global_costmap/costmap:
          publisher:
            durability: VOLATILE
      plugins:
      - voxel_layer
      - inflation_layer
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.4
        cost_scaling_factor: 5.0
      voxel_layer:
        plugin: nav2_costmap_2d::VoxelLayer
        enabled: true
        footprint_clearing_enabled: true
        combination_method: 1
        observation_sources: front_scan rear_scan
        front_scan:
          topic: /front_lidar/filtered
          sensor_frame: rslidar_head
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_range: 3.0
          raytrace_range: 4.0
          clearing: true
          marking: true
          data_type: PointCloud2
        rear_scan:
          topic: /rear_lidar/filtered
          sensor_frame: rslidar_tail
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_range: 3.0
          raytrace_range: 4.0
          clearing: true
          marking: true
          data_type: PointCloud2
      footprint: '[[0.5, 0.3], [0.5, -0.3], [-0.5, -0.3], [-0.5, 0.3]]'

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: false
    planner_plugins:
    - GridBased
    GridBased:
      plugin: nav2_smac_planner/SmacPlanner2D
      tolerance: 0.25
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      minimum_turning_radius: 0.5
      reverse_penalty: 2.1
      use_astar: true
      smoother:
        max_iterations: 500
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1e-10
        do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: /local_costmap/costmap_raw
    global_costmap_topic: /global_costmap/costmap_raw
    local_footprint_topic: /local_costmap/published_footprint
    global_footprint_topic: /global_costmap/published_footprint
    cycle_frequency: 10.0
    max_rotational_vel: 0.3
    min_rotational_vel: 0.05
    rotational_acc_lim: 1.0
    costmap_topic: /local_costmap/costmap_raw
    footprint_topic: /local_costmap/published_footprint
    plugins:
    - spin
    - backup
    - wait
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
      minimum_speed: 0.15
    wait:
      plugin: nav2_behaviors/Wait

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 0