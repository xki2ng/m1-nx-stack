/**:
  ros__parameters:
    # ====== TF Frames (M1 FAST-LIO) ======
    global_frame: map
    odom_frame: odom
    robot_base_frame: imu_link
    transform_tolerance: 2.0
    use_sim_time: false

    # ====== Robot Footprint (M1 standing, with safety margin) ======
    robot_radius: 0.5    # approximate M1 bounding circle

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      # ---- Robot kinematics ----
      max_vel_x: 0.3
      min_vel_x: -0.15          # allow reverse
      max_vel_y: 0.15            # lateral (M1 omnidirectional)
      min_vel_y: -0.15
      max_vel_theta: 0.3
      min_vel_theta: -0.3
      acc_lim_x: 0.5
      acc_lim_y: 0.5
      acc_lim_theta: 0.8
      dec_lim_x: -0.5
      dec_lim_theta: -0.8

      # ---- Goal tolerance ----
      xy_goal_tolerance: 0.3
      yaw_goal_tolerance: 0.3
      latch_xy_goal_tolerance: true

      # ---- Trajectory scoring ----
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      GoalAlign.scale: 24.0
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0

      # ---- Forward simulation ----
      sim_time: 2.0
      vx_samples: 10
      vy_samples: 5
      vth_samples: 15

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.25
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    # ---- Robot posture safety: prevent Nav2 from lying down ----
    # M1 requires Stand→Crawl→LieDown sequence; Nav2 should only operate
    # while robot is already in Stand or Crawl mode.
    local_costmap_topic: /local_costmap/costmap_raw
    global_costmap_topic: /global_costmap/costmap_raw
    cycle_frequency: 20.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"

bt_navigator:
  ros__parameters:
    bt_xml_filename: ""
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_charging_condition_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_remove_passed_goals_action_bt_node

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.1
      robot_radius: 0.5
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: front_lidar
        front_lidar:
          topic: /front_lidar
          max_obstacle_height: 3.0
          min_obstacle_height: 0.0
          obstacle_max_range: 15.0
          obstacle_min_range: 0.3
          clearing: true
          marking: true
          data_type: "PointCloud2"
          sensor_frame: rslidar_head
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.6
        cost_scaling_factor: 2.5
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 1.0
      rolling_window: true
      width: 40
      height: 40
      resolution: 0.2
      robot_radius: 0.5
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: front_lidar
        front_lidar:
          topic: /front_lidar
          max_obstacle_height: 3.0
          min_obstacle_height: 0.0
          obstacle_max_range: 15.0
          obstacle_min_range: 0.3
          clearing: true
          marking: true
          data_type: "PointCloud2"
          sensor_frame: rslidar_head
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.6
        cost_scaling_factor: 2.5
      always_send_full_costmap: true

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.3, 0.3, 1.0]
    min_velocity: [-0.15, -0.15, -1.0]
    acceleration_limits: [0.5, 0.5, 0.8]
    deceleration_limits: [-0.5, -0.5, -0.8]
